<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="./index.html">Home</a>
    <a href="./form.html">Join</a>
    <a href="./gallery.html">Gallery</a>
</nav>

<div class="container">
    <h1>🎬 Multimedia</h1>

    <!-- GAMBAR -->
    <div class="card">
        <h3>📸 Gambar</h3>
        <img id="gambar" src="https://picsum.photos/300" width="300">
        <br><br>
        <button onclick="gantiGambar()">Ganti Gambar</button>
    </div>

    <!-- VIDEO (SUDAH FIX) -->
    <div class="card">
        <h3>🎥 Video</h3>
        <iframe width="100%" height="250"
        src="https://www.youtube.com/embed/Ke90Tje7VS0"
        title="YouTube video"
        frameborder="0"
        allowfullscreen>
        </iframe>
    </div>

    <!-- AUDIO (FIX) -->
    <div class="card">
        <h3>🎧 Audio</h3>
        <audio id="audio" controls>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
        <br><br>
        <button onclick="playAudio()">▶ Play</button>
        <button onclick="pauseAudio()">⏸ Pause</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
